name: CI - CopilotSdk

on:
  push:
    branches: [main]
    paths:
      - 'src/CopilotSdk/**'
      - 'tests/CopilotSdk/**'
      - 'samples/CopilotSdkSample/**'
      - 'eng/**'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'NuGet.config'
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main]
    paths:
      - 'src/CopilotSdk/**'
      - 'tests/CopilotSdk/**'
      - 'samples/CopilotSdkSample/**'
      - 'eng/**'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'NuGet.config'

jobs:
  build:
    uses: ./.github/workflows/_build.yml
    with:
      project-path: src/CopilotSdk/CopilotSdk.slnf
      project-name: copilotsdk
      run-tests: true
      pack: true
      install-workloads: true
