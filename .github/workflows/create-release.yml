# Automatically creates a GitHub Release when a version tag is pushed.
# Tags are pushed by the AzDO official pipeline after successful NuGet publish.

name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Build release notes
      id: notes
      run: |
        TAG="${GITHUB_REF_NAME}"
        VERSION="${TAG#v}"

        # Determine prerelease status
        if [[ "$TAG" == *"preview"* ]] || [[ "$TAG" == *"rc"* ]]; then
          echo "prerelease=true" >> "$GITHUB_OUTPUT"
        else
          echo "prerelease=false" >> "$GITHUB_OUTPUT"
        fi

        # Discover all packable projects from the source tree
        PACKAGES=$(grep -rh '<PackageId>' src/ --include='*.csproj' | \
          sed 's/.*<PackageId>//' | sed 's/<.*//' | sort -u)

        # Build package table
        {
          echo "### NuGet Packages"
          echo ""
          echo "| Package | NuGet |"
          echo "|---------|-------|"

          while IFS= read -r pkg; do
            [ -z "$pkg" ] && continue
            echo "| ${pkg} | [![NuGet](https://img.shields.io/nuget/v/${pkg}.svg)](https://www.nuget.org/packages/${pkg}) |"
          done <<< "$PACKAGES"

          echo ""
          echo "---"
          echo ""
        } > "$RUNNER_TEMP/release-notes.md"

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        TAG="${GITHUB_REF_NAME}"

        ARGS=(
          "$TAG"
          --title "$TAG"
          --notes-file "$RUNNER_TEMP/release-notes.md"
          --generate-notes
        )

        if [ "${{ steps.notes.outputs.prerelease }}" = "true" ]; then
          ARGS+=(--prerelease)
        fi

        gh release create "${ARGS[@]}"
