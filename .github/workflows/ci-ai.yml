name: CI - AI Attributes

on:
  push:
    branches: [main]
    paths:
      - 'src/AI/**'
      - 'eng/**'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'NuGet.config'
  pull_request:
    branches: [main]
    paths:
      - 'src/AI/**'
      - 'eng/**'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'NuGet.config'

jobs:
  build:
    uses: ./.github/workflows/_build.yml
    with:
      project-path: src/AI/AI.slnf
      project-name: ai-attributes
      run-tests: true
      pack: true
      install-workloads: false
