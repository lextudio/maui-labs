name: Nx build (shadow)

# Runs in parallel with the existing per-product workflows so we can compare
# Nx-driven affected builds against the baseline. Non-gating: every job uses
# continue-on-error so failures here don't block PRs.
#
# Per-OS routing is driven by project tags emitted by the @redth/dotnet-nx Nx
# plugin (DotnetNx), backed by <NxBuildableOn> evaluated through MSBuild. Each
# runner picks up only the affected projects whose tag set includes its os-tag,
# so the workflow doesn't carry a centralized exclusion list.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

env:
  NX_DAEMON: false
  NX_CLOUD: false
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1

jobs:
  affected:
    name: Compute affected
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      base: ${{ steps.affected.outputs.base }}
      head: ${{ steps.affected.outputs.head }}
      count: ${{ steps.affected.outputs.count }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/auth-gh-packages
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup nxdn (DotnetNx)
        uses: Redth/Maui.BuildHelpers/DotnetNx/actions/setup-nxdn@v0.2
        with:
          setup-node: 'false'

      - name: Compute affected
        id: affected
        uses: Redth/Maui.BuildHelpers/DotnetNx/actions/affected-info@v0.2

  build:
    name: Build affected (${{ matrix.os }})
    needs: affected
    if: needs.affected.outputs.count != '0'
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os-tag: linux
            install_workloads: false
            native_deps: |
              sudo apt-get update
              sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev
          - os: macos-latest
            os-tag: macos
            install_workloads: true
            native_deps: ''
          - os: windows-latest
            os-tag: windows
            install_workloads: true
            native_deps: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install native dependencies
        if: matrix.native_deps != ''
        shell: bash
        run: ${{ matrix.native_deps }}

      - uses: ./.github/actions/auth-gh-packages
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup nxdn (DotnetNx)
        uses: Redth/Maui.BuildHelpers/DotnetNx/actions/setup-nxdn@v0.2
        with:
          setup-node: 'false'

      - name: Install MAUI workloads
        if: matrix.install_workloads
        shell: bash
        run: dotnet workload install maui macos maui-tizen

      - name: Restore (Nx cached)
        uses: Redth/Maui.BuildHelpers/DotnetNx/actions/run-affected@v0.2
        with:
          target: restore
          base: ${{ needs.affected.outputs.base }}
          head: ${{ needs.affected.outputs.head }}
          os-tag: ${{ matrix.os-tag }}

      - name: Build (Nx cached)
        uses: Redth/Maui.BuildHelpers/DotnetNx/actions/run-affected@v0.2
        with:
          target: build
          base: ${{ needs.affected.outputs.base }}
          head: ${{ needs.affected.outputs.head }}
          os-tag: ${{ matrix.os-tag }}

      - name: Test (Nx cached)
        # Platform integration tests need devices/sims/emulators handled by
        # devflow-integration.yml, so skip them in the shadow build.
        uses: Redth/Maui.BuildHelpers/DotnetNx/actions/run-affected@v0.2
        with:
          target: test
          base: ${{ needs.affected.outputs.base }}
          head: ${{ needs.affected.outputs.head }}
          os-tag: ${{ matrix.os-tag }}
          exclude: Microsoft.Maui.DevFlow.Agent.IntegrationTests.Android,Microsoft.Maui.DevFlow.Agent.IntegrationTests.iOS,Microsoft.Maui.DevFlow.Agent.IntegrationTests.MacCatalyst,Microsoft.Maui.DevFlow.Agent.IntegrationTests.Windows
