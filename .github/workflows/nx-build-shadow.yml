name: Nx build (shadow)

# Runs in parallel with the existing per-product workflows so we can compare
# Nx-driven affected builds against the baseline. Non-gating: every job uses
# continue-on-error so failures here don't block PRs.
#
# Per-OS routing is driven by project tags emitted by the @redth/dotnet-nx Nx
# plugin (DotnetNx), backed by <NxBuildableOn> evaluated through MSBuild. Each
# runner picks up only the affected projects whose tag set includes its os-tag,
# so the workflow doesn't carry a centralized exclusion list.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

env:
  NX_DAEMON: false
  NX_CLOUD: false
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1
  # NuGet credentials for the RedthDotnetNx GitHub Packages feed.
  # Source name has no hyphens so the env-var lookup works directly.
  NuGetPackageSourceCredentials_RedthDotnetNx: Username=USERNAME;Password=${{ secrets.GITHUB_TOKEN }}

jobs:
  affected:
    name: Compute affected matrix
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      base: ${{ steps.matrix.outputs.base }}
      head: ${{ steps.matrix.outputs.head }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      has-work: ${{ steps.matrix.outputs.has-work }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js (with GH Packages auth)
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: https://npm.pkg.github.com
          scope: '@redth'

      - name: Install npm dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup nxdn (DotnetNx)
        uses: Redth/Maui.BuildHelpers/DotnetNx/actions/setup-nxdn@v0.3
        with:
          setup-node: 'false'

      - name: Compute affected matrix
        id: matrix
        uses: Redth/Maui.BuildHelpers/DotnetNx/actions/affected-matrix@v0.3

  build:
    name: Build affected (${{ matrix.os }})
    needs: affected
    if: needs.affected.outputs.has-work == 'true'
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.affected.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install native dependencies (linux)
        if: matrix.osTag == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Setup Node.js (with GH Packages auth)
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: https://npm.pkg.github.com
          scope: '@redth'

      - name: Install npm dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup nxdn (DotnetNx)
        uses: Redth/Maui.BuildHelpers/DotnetNx/actions/setup-nxdn@v0.3
        with:
          setup-node: 'false'

      - name: Setup DotnetNx cache
        uses: Redth/Maui.BuildHelpers/DotnetNx/actions/setup-cache@v0.3

      - name: Install MAUI workloads
        if: matrix.osTag != 'linux'
        shell: bash
        run: dotnet workload install maui macos maui-tizen

      - name: Restore (Nx cached)
        uses: Redth/Maui.BuildHelpers/DotnetNx/actions/run-affected@v0.3
        with:
          target: restore
          base: ${{ needs.affected.outputs.base }}
          head: ${{ needs.affected.outputs.head }}
          os-tag: ${{ matrix.osTag }}

      - name: Build (Nx cached)
        uses: Redth/Maui.BuildHelpers/DotnetNx/actions/run-affected@v0.3
        with:
          target: build
          base: ${{ needs.affected.outputs.base }}
          head: ${{ needs.affected.outputs.head }}
          os-tag: ${{ matrix.osTag }}

      - name: Test (Nx cached)
        # Platform integration tests need devices/sims/emulators handled by
        # devflow-integration.yml, so skip them in the shadow build.
        uses: Redth/Maui.BuildHelpers/DotnetNx/actions/run-affected@v0.3
        with:
          target: test
          base: ${{ needs.affected.outputs.base }}
          head: ${{ needs.affected.outputs.head }}
          os-tag: ${{ matrix.osTag }}
          exclude: Microsoft.Maui.DevFlow.Agent.IntegrationTests.Android,Microsoft.Maui.DevFlow.Agent.IntegrationTests.iOS,Microsoft.Maui.DevFlow.Agent.IntegrationTests.MacCatalyst,Microsoft.Maui.DevFlow.Agent.IntegrationTests.Windows
