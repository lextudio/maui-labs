name: Nx affected report

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  report:
    name: Report affected projects
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      NX_DAEMON: false
      NX_CLOUD: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Compute affected project report
        shell: bash
        env:
          NX_BASE_INPUT: ${{ github.event.pull_request.base.sha || github.event.before }}
          NX_HEAD_INPUT: ${{ github.sha }}
        run: |
          set -euo pipefail

          mkdir -p artifacts/nx

          base="$NX_BASE_INPUT"
          head="$NX_HEAD_INPUT"

          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            if git rev-parse "${head}~1" >/dev/null 2>&1; then
              base="$(git rev-parse "${head}~1")"
            else
              base="$head"
            fi
          fi

          echo "NX_BASE=$base" >> "$GITHUB_ENV"
          echo "NX_HEAD=$head" >> "$GITHUB_ENV"

          ./nx show projects --affected --base="$base" --head="$head" --json \
            > artifacts/nx/affected-projects.json
          ./nx graph --affected --base="$base" --head="$head" \
            --file=artifacts/nx/affected-project-graph.json --open=false

      - name: Summarize affected project report
        if: always()
        shell: bash
        run: |
          node <<'JS'
          const fs = require('fs');

          let projects = [];
          const reportPath = 'artifacts/nx/affected-projects.json';
          if (fs.existsSync(reportPath)) {
            const raw = fs.readFileSync(reportPath, 'utf8').trim();
            if (raw) {
              const parsed = JSON.parse(raw);
              projects = Array.isArray(parsed) ? parsed : Object.keys(parsed);
            }
          }

          const lines = [
            '## Nx affected report',
            '',
            `Base: \`${process.env.NX_BASE || '<unknown>'}\``,
            `Head: \`${process.env.NX_HEAD || '<unknown>'}\``,
            '',
            `Affected projects: **${projects.length}**`,
            ''
          ];

          if (projects.length === 0) {
            lines.push('_No affected projects reported by Nx._');
          } else {
            for (const project of projects.sort()) {
              lines.push(`- \`${project}\``);
            }
          }

          lines.push('');
          lines.push('This is report-only telemetry from Nx and `@nx/dotnet`; existing build workflows are unchanged.');

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join('\n')}\n`);
          JS

      - name: Upload affected project report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nx-affected-report
          path: artifacts/nx/

  cache-canary:
    name: Nx cache canary
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      NX_DAEMON: false
      NX_CLOUD: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Nx dependencies
        run: npm ci

      - name: Export MSBuild SDK resolver environment
        run: node eng/nx/nx-msbuild-resolvers.js --export-github-env

      - name: Compute affected range
        id: affected
        shell: bash
        env:
          NX_BASE_INPUT: ${{ github.event.pull_request.base.sha || github.event.before }}
          NX_HEAD_INPUT: ${{ github.sha }}
        run: |
          set -euo pipefail

          base="$NX_BASE_INPUT"
          head="$NX_HEAD_INPUT"

          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            if git rev-parse "${head}~1" >/dev/null 2>&1; then
              base="$(git rev-parse "${head}~1")"
            else
              base="$head"
            fi
          fi

          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "head=$head" >> "$GITHUB_OUTPUT"

      - name: Restore affected projects through Nx cache canary
        uses: raegen/nx@72461f06bf34d4e37cf1274a3b48aebe48b20951
        with:
          nx: affected -t restore --base=${{ steps.affected.outputs.base }} --head=${{ steps.affected.outputs.head }}

      - name: Build affected projects through Nx cache canary
        uses: raegen/nx@72461f06bf34d4e37cf1274a3b48aebe48b20951
        with:
          nx: affected -t build --base=${{ steps.affected.outputs.base }} --head=${{ steps.affected.outputs.head }}

      - name: Test affected projects through Nx cache canary
        uses: raegen/nx@72461f06bf34d4e37cf1274a3b48aebe48b20951
        with:
          nx: affected -t test --base=${{ steps.affected.outputs.base }} --head=${{ steps.affected.outputs.head }} --exclude=Microsoft.Maui.DevFlow.Agent.IntegrationTests
