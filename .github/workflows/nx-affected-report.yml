name: Nx affected report

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  NX_DAEMON: false
  NX_CLOUD: false
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1

jobs:
  report:
    name: Report affected projects
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup nxdn (DotnetNx)
        uses: Redth/Maui.BuildHelpers/DotnetNx/actions/setup-nxdn@ab2fef3e080396a22b6fc3b6d1a9a9eb3c67b701

      - name: Compute affected projects
        id: affected
        uses: Redth/Maui.BuildHelpers/DotnetNx/actions/affected-info@ab2fef3e080396a22b6fc3b6d1a9a9eb3c67b701

      - name: Capture affected project graph
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/nx
          cp "${{ steps.affected.outputs.projects-json }}" artifacts/nx/affected-projects.json
          nxdn nx -- graph \
            --affected \
            --base="${{ steps.affected.outputs.base }}" \
            --head="${{ steps.affected.outputs.head }}" \
            --file=artifacts/nx/affected-project-graph.json \
            --open=false

      - name: Upload affected project report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nx-affected-report
          path: artifacts/nx/

  cache-canary:
    name: Nx cache canary
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup nxdn (DotnetNx)
        uses: Redth/Maui.BuildHelpers/DotnetNx/actions/setup-nxdn@ab2fef3e080396a22b6fc3b6d1a9a9eb3c67b701

      - name: Compute affected range
        id: affected
        uses: Redth/Maui.BuildHelpers/DotnetNx/actions/affected-info@ab2fef3e080396a22b6fc3b6d1a9a9eb3c67b701

      - name: Restore affected
        uses: Redth/Maui.BuildHelpers/DotnetNx/actions/run-affected@ab2fef3e080396a22b6fc3b6d1a9a9eb3c67b701
        with:
          target: restore
          base: ${{ steps.affected.outputs.base }}
          head: ${{ steps.affected.outputs.head }}

      - name: Build affected
        uses: Redth/Maui.BuildHelpers/DotnetNx/actions/run-affected@ab2fef3e080396a22b6fc3b6d1a9a9eb3c67b701
        with:
          target: build
          base: ${{ steps.affected.outputs.base }}
          head: ${{ steps.affected.outputs.head }}

      - name: Test affected
        uses: Redth/Maui.BuildHelpers/DotnetNx/actions/run-affected@ab2fef3e080396a22b6fc3b6d1a9a9eb3c67b701
        with:
          target: test
          base: ${{ steps.affected.outputs.base }}
          head: ${{ steps.affected.outputs.head }}
          exclude: Microsoft.Maui.DevFlow.Agent.IntegrationTests.Android,Microsoft.Maui.DevFlow.Agent.IntegrationTests.iOS,Microsoft.Maui.DevFlow.Agent.IntegrationTests.MacCatalyst,Microsoft.Maui.DevFlow.Agent.IntegrationTests.Windows
