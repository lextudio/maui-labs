name: Authenticate to GitHub Packages
description: |
  Sets up .NET, configures NuGet credentials for the Redth-DotnetNx feed
  (https://nuget.pkg.github.com/Redth), authenticates npm against
  https://npm.pkg.github.com for the @redth scope, and runs `npm ci` so
  the @redth/dotnet-nx Nx plugin is available before nxdn / Nx run.

inputs:
  github-token:
    description: "Token with `packages: read` scope (typically secrets.GITHUB_TOKEN)."
    required: true
  github-actor:
    description: GitHub actor name used for the NuGet credential.
    required: false
    default: ${{ github.actor }}
  global-json-file:
    description: Optional global.json path for actions/setup-dotnet.
    required: false
    default: global.json
  run-npm-ci:
    description: Whether to run `npm ci` after configuring credentials.
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - uses: actions/setup-dotnet@v5
      with:
        global-json-file: ${{ inputs.global-json-file }}

    - uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Configure NuGet auth (Redth-DotnetNx)
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        GH_ACTOR: ${{ inputs.github-actor }}
      run: |
        set -euo pipefail
        # `add source` fails if the source already exists; on retries (or when
        # the runner caches a prior user-level config) fall through to update.
        if ! dotnet nuget add source "https://nuget.pkg.github.com/Redth/index.json" \
              --name "Redth-DotnetNx" \
              --username "$GH_ACTOR" \
              --password "$GH_TOKEN" \
              --store-password-in-clear-text >/dev/null 2>&1; then
          dotnet nuget update source "Redth-DotnetNx" \
            --username "$GH_ACTOR" \
            --password "$GH_TOKEN" \
            --store-password-in-clear-text
        fi

    - name: Configure npm auth (npm.pkg.github.com)
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        {
          echo "//npm.pkg.github.com/:_authToken=${GH_TOKEN}"
          echo "@redth:registry=https://npm.pkg.github.com"
        } >> "$HOME/.npmrc"

    - name: Install npm packages (npm ci)
      if: inputs.run-npm-ci == 'true'
      shell: bash
      run: npm ci
