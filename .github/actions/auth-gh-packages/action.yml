name: Authenticate to GitHub Packages
description: |
  Sets up .NET + Node, configures NuGet credentials for the Redth-DotnetNx
  feed (https://nuget.pkg.github.com/Redth) at user level, configures npm
  for the @redth scope on https://npm.pkg.github.com via actions/setup-node,
  and runs `npm ci` so the @redth/dotnet-nx Nx plugin is available before
  nxdn / Nx run.

inputs:
  github-token:
    description: "Token with `packages: read` scope (typically secrets.GITHUB_TOKEN)."
    required: true
  github-actor:
    description: GitHub actor name used for the NuGet credential.
    required: false
    default: ${{ github.actor }}
  global-json-file:
    description: Optional global.json path for actions/setup-dotnet.
    required: false
    default: global.json
  run-npm-ci:
    description: Whether to run `npm ci` after configuring credentials.
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - uses: actions/setup-dotnet@v5
      with:
        global-json-file: ${{ inputs.global-json-file }}

    # actions/setup-node natively handles GH Packages auth: with registry-url
    # + scope it writes a properly-scoped ~/.npmrc that picks up NODE_AUTH_TOKEN
    # at install time. Avoids hand-rolling .npmrc.
    - uses: actions/setup-node@v6
      with:
        node-version: '22'
        registry-url: https://npm.pkg.github.com
        scope: '@redth'

    # No comparable marketplace action exists for GH Packages NuGet auth, so we
    # add the credential at user-level NuGet.Config at runtime. Needed because
    # `dotnet tool update --global` (run by setup-nxdn) reads user-level config.
    - name: Configure NuGet auth (Redth-DotnetNx)
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        GH_ACTOR: ${{ inputs.github-actor }}
      run: |
        set -euo pipefail
        if ! dotnet nuget add source "https://nuget.pkg.github.com/Redth/index.json" \
              --name "Redth-DotnetNx" \
              --username "$GH_ACTOR" \
              --password "$GH_TOKEN" \
              --store-password-in-clear-text >/dev/null 2>&1; then
          dotnet nuget update source "Redth-DotnetNx" \
            --username "$GH_ACTOR" \
            --password "$GH_TOKEN" \
            --store-password-in-clear-text
        fi

    - name: Install npm packages (npm ci)
      if: inputs.run-npm-ci == 'true'
      shell: bash
      env:
        NODE_AUTH_TOKEN: ${{ inputs.github-token }}
      run: npm ci
