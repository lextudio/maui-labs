# Azure DevOps official build pipeline for DevFlow
# Uses dotnet/arcade build infrastructure with 1ES Pipeline Templates.
# Runs on commits to main/release branches — produces signed & publishable packages.

trigger:
  batch: true
  branches:
    include:
    - main
    - release/*
  paths:
    include:
    - src/DevFlow/**
    - eng/**
    - Directory.Build.props
    - Directory.Build.targets
    - Directory.Packages.props
    - global.json
    - NuGet.config

pr: none

variables:
- template: /eng/pipelines/common-variables.yml@self
- name: _BuildConfig
  value: Release

resources:
  repositories:
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    pool:
      name: NetCore1ESPool-Internal
      image: windows.vs2022.amd64
      os: windows
    sdl:
      binskim:
        scanOutputDirectoryOnly: true
      spotBugs:
        enabled: false
        justification: 'Not applicable — no Java code in this repository'

    stages:

    # ── Build ──────────────────────────────────────────────────────────
    - stage: build
      displayName: Build
      jobs:
      - template: /eng/common/templates-official/jobs/jobs.yml@self
        parameters:
          enablePublishUsingPipelines: true
          enablePublishBuildArtifacts: true
          enablePublishTestResults: true
          enableTelemetry: true
          jobs:

          - job: Windows
            pool:
              name: NetCore1ESPool-Internal
              demands: ImageOverride -equals windows.vs2022.amd64
            timeoutInMinutes: 60
            strategy:
              matrix:
                Release:
                  _BuildConfig: Release
                  _OfficialBuildArgs: >-
                    /p:DotNetSignType=$(_SignType)
                    /p:TeamName=$(_TeamName)
                    /p:DotNetPublishUsingPipelines=true
                    /p:OfficialBuildId=$(BUILD.BUILDNUMBER)
            steps:
            - task: NuGetAuthenticate@1
              displayName: Authenticate NuGet feeds

            - script: dotnet workload install maui macos
              displayName: Install MAUI workloads

            - script: eng\common\cibuild.cmd
                -configuration $(_BuildConfig)
                -prepareMachine
                -projects $(Build.SourcesDirectory)\src\DevFlow\DevFlow.slnf
                $(_OfficialBuildArgs)
              displayName: Build and Test

          - job: macOS
            pool:
              name: Azure Pipelines
              vmImage: macOS-15
              os: macOS
            timeoutInMinutes: 60
            strategy:
              matrix:
                Release:
                  _BuildConfig: Release
            steps:
            - script: dotnet workload install maui macos
              displayName: Install MAUI workloads

            - script: eng/common/cibuild.sh
                --configuration $(_BuildConfig)
                --prepareMachine
                --projects $(Build.SourcesDirectory)/src/DevFlow/DevFlow.slnf
              displayName: Build and Test

    # ── Post-build (validation + publishing) ───────────────────────────
    - template: /eng/common/templates-official/post-build/post-build.yml@self
      parameters:
        enableSourceLinkValidation: false
        enableSigningValidation: true
        enableNugetValidation: true
        publishInstallersAndChecksums: false
