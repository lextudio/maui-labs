name: dev-build

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev, main ]

  workflow_dispatch:

jobs:
  build:
    name: Build Comet
    env:
        NUPKG_MAJOR: 0.4
        BASE: 1
    runs-on: macos-latest

    steps: 
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI Workload
        run: dotnet workload install maui

      - name: Build Source Generator
        run: dotnet build src/Comet.SourceGenerator/Comet.SourceGenerator.csproj -c Release

      - name: Build Comet
        run: dotnet build src/Comet/Comet.csproj -c Release

      - name: Build Sample
        run: dotnet build sample/Comet.Sample/Comet.Sample.csproj -c Release -f net9.0-maccatalyst

      - name: Build Tests
        run: dotnet build tests/Comet.Tests/Comet.Tests.csproj -c Release

      - name: Run Tests
        run: dotnet test tests/Comet.Tests/Comet.Tests.csproj --no-build -c Release
      
