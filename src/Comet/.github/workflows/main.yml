name: main-build

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'templates/**'

  workflow_dispatch:

jobs:
  build:
    name: Build Comet
    env:
        NUPKG_MAJOR: 0.4
        BASE: 1
    runs-on: macos-latest

    steps: 
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI Workload
        run: dotnet workload install maui

      - name: Build Source Generator
        run: dotnet build src/Comet.SourceGenerator/Comet.SourceGenerator.csproj -c Release

      - name: Build Comet
        run: dotnet build src/Comet/Comet.csproj -c Release

      - name: Run Tests
        run: dotnet test tests/Comet.Tests/Comet.Tests.csproj -c Release

      - name: Pack NuGet
        run: |
          MINOR_VERSION=$(( $BASE + $GITHUB_RUN_NUMBER ))
          VERSION=0.4.$MINOR_VERSION
          echo "PACKAGE VERSION: $VERSION"
          dotnet pack src/Comet/Comet.csproj -c Release -p:PackageVersion=$VERSION -o ./artifacts

      - uses: actions/upload-artifact@v4
        name: Upload NuGet Artifact
        with:
          name: nuget-artifact
          path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg

  publish:
      name: Publish
      needs:
        - build
      runs-on: ubuntu-latest
      steps:
        - name: Download Artifacts
          uses: actions/download-artifact@v4
          with:
            name: nuget-artifact
            path: nuget-artifact
        
        - name: Setup .NET
          uses: actions/setup-dotnet@v4
          with:
            dotnet-version: '9.0.x'
            
        - name: Push to NuGet.org
          run: |
            dotnet nuget push "nuget-artifact/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_ORG_API_KEY }} --skip-duplicate
